name: Build & Deploy

on:
  push:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/taylorfmartins/fintazz-api
  WORKER_IMAGE: ghcr.io/taylorfmartins/fintazz-worker

jobs:
  # Roda apenas no push em develop: builda e publica imagem :dev
  build-and-push:
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          tags: ${{ env.API_IMAGE }}:dev,${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: true
          tags: ${{ env.WORKER_IMAGE }}:dev,${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Roda apenas no push em main: promove :dev para :latest sem rebuild
  promote:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote API image dev → latest
        run: |
          docker pull ${{ env.API_IMAGE }}:dev
          docker tag ${{ env.API_IMAGE }}:dev ${{ env.API_IMAGE }}:latest
          docker push ${{ env.API_IMAGE }}:latest

      - name: Promote Worker image dev → latest
        run: |
          docker pull ${{ env.WORKER_IMAGE }}:dev
          docker tag ${{ env.WORKER_IMAGE }}:dev ${{ env.WORKER_IMAGE }}:latest
          docker push ${{ env.WORKER_IMAGE }}:latest

  # Deploy em dev (develop) ou produção (main) via SSH
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, promote]
    if: always() && (needs.build-and-push.result == 'success' || needs.promote.result == 'success')

    steps:
      - name: Set deploy vars
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "dir=production" >> $GITHUB_OUTPUT
            echo "env=Production" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "api_port=8080" >> $GITHUB_OUTPUT
            echo "api_container=fintazz-api" >> $GITHUB_OUTPUT
            echo "worker_container=fintazz-worker" >> $GITHUB_OUTPUT
          else
            echo "dir=dev" >> $GITHUB_OUTPUT
            echo "env=Development" >> $GITHUB_OUTPUT
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "api_port=8081" >> $GITHUB_OUTPUT
            echo "api_container=fintazz-api-dev" >> $GITHUB_OUTPUT
            echo "worker_container=fintazz-worker-dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/fintazz/${{ steps.vars.outputs.dir }}
            cat > docker-compose.yml << 'COMPOSE'
            services:
              api:
                image: ghcr.io/taylorfmartins/fintazz-api:${{ steps.vars.outputs.tag }}
                container_name: ${{ steps.vars.outputs.api_container }}
                ports:
                  - "${{ steps.vars.outputs.api_port }}:8080"
                env_file: .env
                environment:
                  - ASPNETCORE_ENVIRONMENT=${{ steps.vars.outputs.env }}
                restart: unless-stopped

              worker:
                image: ghcr.io/taylorfmartins/fintazz-worker:${{ steps.vars.outputs.tag }}
                container_name: ${{ steps.vars.outputs.worker_container }}
                env_file: .env
                environment:
                  - DOTNET_ENVIRONMENT=${{ steps.vars.outputs.env }}
                restart: unless-stopped
            COMPOSE
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }}
            docker compose pull
            docker compose up -d
            docker image prune -f
